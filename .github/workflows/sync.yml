name: Daily Sync

on:
  schedule:
    - cron: '30 22 * * *'   # 每天 06:30 北京时间
  workflow_dispatch:          # 手动触发（Cookie 过期后抢救当天日推）

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography requests

      - name: Sync
        env:
          NCM_COOKIE: ${{ secrets.NCM_COOKIE }}
        run: python sync.py sync

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.md today.lxmc data/state.json data/history.json
          git diff --staged --quiet || (
            git commit -m "Daily sync $(date +%Y-%m-%d)" &&
            git push
          )
